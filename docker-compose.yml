services:
  # RTSP relay: phones push to this service, the web runtime reads from it.
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: optiflow-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554/tcp"
      - "8554:8554/udp"
    environment:
      - RTSP_PUBLISH_PASSWORD=${RTSP_PUBLISH_PASSWORD:-changeme}
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  optiflow-app:
    build:
      context: .
    container_name: optiflow-app
    command: ["uvicorn", "web_server:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    depends_on:
      - mediamtx
    env_file:
      - .env
    environment:
      - CAMERA_SOURCE_NORTH=${CAMERA_SOURCE_NORTH:-Simulated}
      - CAMERA_SOURCE_SOUTH=${CAMERA_SOURCE_SOUTH:-Simulated}
      - CAMERA_SOURCE_EAST=${CAMERA_SOURCE_EAST:-Simulated}
      - CAMERA_SOURCE_WEST=${CAMERA_SOURCE_WEST:-Simulated}
      - RTSP_TRANSPORT=${RTSP_TRANSPORT:-tcp}
      - AI_THROTTLE_SECONDS=${AI_THROTTLE_SECONDS:-0.2}
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./assets/web_evidence:/app/assets/web_evidence
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    container_name: optiflow-nginx
    depends_on:
      optiflow-app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro

  # Certbot is run manually on first deploy:
  # docker compose run --rm certbot
  certbot:
    image: infinityofspace/certbot-dns-duckdns:latest
    container_name: optiflow-certbot
    profiles:
      - certbot
    env_file:
      - .env
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: >
      certonly
      --non-interactive
      --agree-tos
      --email ${CERTBOT_EMAIL}
      --preferred-challenges dns-01
      --authenticator dns-duckdns
      --dns-duckdns-token ${DUCKDNS_TOKEN}
      --dns-duckdns-propagation-seconds 60
      --cert-name optiflow
      -d ${DOMAIN}
