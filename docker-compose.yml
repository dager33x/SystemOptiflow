services:
  # RTSP relay: phones push to this service, the web runtime reads from it.
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: optiflow-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554/tcp"
      - "8554:8554/udp"
    environment:
      - RTSP_PUBLISH_PASSWORD=${RTSP_PUBLISH_PASSWORD:-changeme}
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  # TURN relay: allows WebRTC streams to traverse cellular/restrictive NATs.
  # Firewall rules required on the VPS:
  #   UDP 3478  (STUN/TURN signalling)
  #   TCP 3478  (TURN/TCP fallback)
  #   UDP 49152-65535  (relay media)
  coturn:
    image: coturn/coturn:latest
    container_name: optiflow-coturn
    # host networking lets coturn bind relay sockets to the real public IP
    network_mode: host
    restart: unless-stopped
    command: >
      -n
      --log-file=stdout
      --external-ip=${VPS_PUBLIC_IP}
      --listening-port=3478
      --lt-cred-mech
      --user=${TURN_USERNAME:-optiflow}:${TURN_PASSWORD:-changeme}
      --realm=optiflow
      --no-tls
      --no-dtls
      --min-port=49152
      --max-port=65535

  optiflow-app:
    build:
      context: .
    container_name: optiflow-app
    depends_on:
      - mediamtx
      - coturn
    env_file:
      - .env
    environment:
      - CAMERA_SOURCE_NORTH=${CAMERA_SOURCE_NORTH:-Simulated}
      - CAMERA_SOURCE_SOUTH=${CAMERA_SOURCE_SOUTH:-Simulated}
      - CAMERA_SOURCE_EAST=${CAMERA_SOURCE_EAST:-Simulated}
      - CAMERA_SOURCE_WEST=${CAMERA_SOURCE_WEST:-Simulated}
      - RTSP_TRANSPORT=${RTSP_TRANSPORT:-tcp}
      - AI_THROTTLE_SECONDS=${AI_THROTTLE_SECONDS:-0.2}
      - VPS_PUBLIC_IP=${VPS_PUBLIC_IP:-}
      - TURN_USERNAME=${TURN_USERNAME:-optiflow}
      - TURN_PASSWORD=${TURN_PASSWORD:-changeme}
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./assets/web_evidence:/app/assets/web_evidence
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    container_name: optiflow-nginx
    depends_on:
      optiflow-app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro

  # Certbot is run manually on first deploy:
  # docker compose run --rm certbot
  certbot:
    image: ghcr.io/infinityofspace/certbot_dns_duckdns:latest
    container_name: optiflow-certbot
    profiles:
      - certbot
    env_file:
      - .env
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: >
      certonly
      --non-interactive
      --agree-tos
      --email ${CERTBOT_EMAIL}
      --preferred-challenges dns-01
      --authenticator dns-duckdns
      --dns-duckdns-token ${DUCKDNS_TOKEN}
      --dns-duckdns-propagation-seconds 60
      --cert-name optiflow
      --force-renewal
      -d ${DOMAIN}
