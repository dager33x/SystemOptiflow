<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/app.css?v=3.0">
  <style>
    .stream-body { padding: 0; }
    .stream-shell { min-height: calc(100vh - 88px); display: grid; place-items: center; padding: 16px; }
    .stream-card {
      width: min(480px, 100%);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
      backdrop-filter: blur(14px);
      padding: 28px 24px;
    }
    .stream-card h1 { font-size: 1.25rem; margin-bottom: 4px; }
    .stream-card .lede { margin: 0 0 24px; font-size: 0.9rem; }
    .stream-preview {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 12px;
      background: #000;
      display: block;
      margin-bottom: 16px;
    }
    .stream-controls { display: grid; gap: 14px; }
    .stream-status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .stream-status.idle     { background: rgba(159,183,201,.15); color: var(--muted); }
    .stream-status.connecting { background: rgba(255,200,87,.15); color: var(--warning); }
    .stream-status.live     { background: rgba(156,242,141,.15); color: var(--accent-2); }
    .stream-status.error    { background: rgba(255,123,114,.15); color: var(--danger); }
    .stream-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    #toggle-btn { width: auto; padding: 12px 28px; touch-action: manipulation; }
    .back-link { display: inline-block; margin-top: 20px; color: var(--muted); font-size: 0.85rem; text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    canvas { display: none; }
  </style>
</head>
<body class="app-body stream-body">
  <nav class="app-nav">
    <span class="brand">SystemOptiflow</span>
    <div class="app-nav-links">
      <a href="/dashboard"><span>Dashboard</span></a>
      <a href="/violations"><span>Violations</span></a>
      <a href="/reports"><span>Reports</span></a>
      <a href="/incidents"><span>Incidents</span></a>
      <a href="/traffic-reports"><span>Traffic Reports</span></a>
      <a href="/stream" class="active stream-link">📱 <span>Stream</span></a>
      <a href="/settings"><span>Settings</span></a>
    </div>
    <div class="app-nav-right">
      <span class="badge">{{ user.username }}</span>
      <button id="logout-button" class="ghost" style="width:auto;padding:8px 14px">Log out</button>
    </div>
  </nav>
  <main class="stream-shell">
    <section class="stream-card">
      <p class="eyebrow">SystemOptiflow</p>
      <h1>&#128247; Phone Camera Stream</h1>
      <p class="lede">Stream your phone camera to a traffic lane without a separate app.</p>

      <video id="preview" class="stream-preview" autoplay playsinline muted></video>
      <canvas id="canvas" width="640" height="480"></canvas>

      <div class="stream-controls">
        <label>
          <span>Target lane</span>
          <select id="lane-select">
            {% for lane in lanes %}
            <option value="{{ lane }}">{{ lane|upper }}</option>
            {% endfor %}
          </select>
        </label>
        <div class="stream-row">
          <button id="toggle-btn" type="button">Start Streaming</button>
          <span id="status" class="stream-status idle">Idle</span>
          <span id="mode-label" class="stream-status idle"></span>
        </div>
        <p id="turn-warning" style="display:none;margin-top:12px;font-size:.82rem;color:var(--warning)"></p>
      </div>

      <a class="back-link" href="/dashboard">&#8592; Back to Dashboard</a>
    </section>
  </main>

  <script>
    const streamSettings = {{ stream_settings | tojson }};
    const urlLane = new URLSearchParams(location.search).get("lane");
    if (urlLane) {
      const opt = document.querySelector(`#lane-select option[value="${urlLane}"]`);
      if (opt) opt.selected = true;
    }

    const preview = document.getElementById("preview");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const toggleBtn = document.getElementById("toggle-btn");
    const laneSelect = document.getElementById("lane-select");
    const statusEl = document.getElementById("status");

    let ws = null;
    let stream = null;
    let active = false;
    let frameInFlight = false;  // prevents overlapping encodes, not the loop clock
    let rtcPc = null;           // WebRTC peer connection (webrtc mode only)

    const captureMode = streamSettings.phone_capture_mode ?? "canvas_jpeg";

    // Show active capture mode before streaming starts
    const modeLabelEl = document.getElementById("mode-label");
    modeLabelEl.textContent = captureMode === "webrtc" ? "Mode: WebRTC" : "Mode: Canvas JPEG";

    // For WebRTC mode, check whether the server has a TURN relay configured
    if (captureMode === "webrtc") {
      fetch("/api/webrtc/ice-config").then(r => r.ok ? r.json() : null).then(data => {
        const turnWarning = document.getElementById("turn-warning");
        const hasTurn = data?.iceServers?.some(s => String(s.urls).startsWith("turn:"));
        if (hasTurn) {
          modeLabelEl.className = "stream-status live";
          modeLabelEl.textContent = "Mode: WebRTC · TURN ready";
        } else {
          turnWarning.style.display = "block";
          turnWarning.textContent = "No TURN server configured — WebRTC may fail on cellular. Set VPS_PUBLIC_IP in .env and install coturn on the VPS.";
        }
      }).catch(() => {});
    }

    function normalizedSettings() {
      return {
        captureFps: Math.max(5, Math.min(30, Number(streamSettings.browser_capture_fps) || 20)),
        width: Math.max(160, Math.min(1920, Number(streamSettings.browser_stream_width) || 640)),
        height: Math.max(120, Math.min(1080, Number(streamSettings.browser_stream_height) || 480)),
        quality: Math.max(0.3, Math.min(0.9, Number(streamSettings.browser_stream_jpeg_quality) || 0.6)),
      };
    }

    function blobFromCanvas(type, quality) {
      return new Promise(resolve => canvas.toBlob(resolve, type, quality));
    }

    function setStatus(state, text) {
      statusEl.className = "stream-status " + state;
      statusEl.textContent = text;
    }

    async function startStreaming() {
      const lane = laneSelect.value;
      const settings = normalizedSettings();
      setStatus("connecting", "Connecting...");
      toggleBtn.disabled = true;
      laneSelect.disabled = true;

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",
            width:  { ideal: 1280 },
            height: { ideal: 720 },
            frameRate: { ideal: settings.captureFps, max: settings.captureFps },
          },
          audio: false,
        });
        preview.srcObject = stream;
        // Set canvas to the camera's actual resolution so no stretching occurs
        await new Promise(resolve => {
          if (preview.readyState >= 1) { resolve(); return; }
          preview.onloadedmetadata = resolve;
        });
        canvas.width  = preview.videoWidth  || 1280;
        canvas.height = preview.videoHeight || 720;
      } catch (_err) {
        setStatus("error", "Camera denied");
        toggleBtn.textContent = "Start Streaming";
        toggleBtn.disabled = false;
        laneSelect.disabled = false;
        return;
      }

      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${proto}//${location.host}/ws/stream/${lane}`);
      ws.binaryType = "arraybuffer";

      ws.onopen = () => {
        active = true;
        setStatus("live", "Live");
        toggleBtn.textContent = "Stop Streaming";
        toggleBtn.disabled = false;
        void runStreamingLoop(settings);
      };

      ws.onerror = () => {
        setStatus("error", "Connection error");
        stopStreaming();
      };

      ws.onclose = () => {
        if (active) {
          setStatus("idle", "Disconnected");
          stopStreaming();
        }
      };
    }

    async function captureAndSend(quality) {
      if (!ws || ws.readyState !== WebSocket.OPEN || frameInFlight) return;
      frameInFlight = true;
      ctx.drawImage(preview, 0, 0, canvas.width, canvas.height);
      try {
        const blob = await blobFromCanvas("image/jpeg", quality);
        if (!blob || !ws || ws.readyState !== WebSocket.OPEN) return;
        const buf = await blob.arrayBuffer();
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(buf);
        }
      } finally {
        frameInFlight = false;
      }
    }

    async function runStreamingLoop(settings) {
      const intervalMs = 1000 / settings.captureFps;
      while (active && ws && ws.readyState === WebSocket.OPEN) {
        // Fire-and-forget: don't await encode/send — keep the timer ticking at
        // exactly captureFps regardless of how long toBlob() takes.
        void captureAndSend(settings.quality);
        await new Promise(resolve => setTimeout(resolve, intervalMs));
      }
    }

    function stopStreaming() {
      active = false;
      frameInFlight = false;
      if (ws && ws.readyState === WebSocket.OPEN) ws.close();
      ws = null;
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      preview.srcObject = null;
      toggleBtn.textContent = "Start Streaming";
      toggleBtn.disabled = false;
      laneSelect.disabled = false;
      if (statusEl.classList.contains("live") || statusEl.classList.contains("connecting")) {
        setStatus("idle", "Idle");
      }
    }

    // ── WebRTC mode ──────────────────────────────────────────────────────────────
    async function startWebRTC() {
      const lane = laneSelect.value;
      setStatus("connecting", "Connecting (WebRTC)…");
      toggleBtn.disabled = true;
      laneSelect.disabled = true;

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false,
        });
        preview.srcObject = stream;
      } catch (_) {
        setStatus("error", "Camera denied");
        toggleBtn.textContent = "Start Streaming";
        toggleBtn.disabled = false;
        laneSelect.disabled = false;
        return;
      }

      // Fetch ICE config (STUN + TURN credentials) from server
      let iceServers = [{ urls: "stun:stun.l.google.com:19302" }];
      try {
        const r = await fetch("/api/webrtc/ice-config");
        if (r.ok) { const d = await r.json(); iceServers = d.iceServers; }
      } catch (_) {}

      rtcPc = new RTCPeerConnection({ iceServers });
      stream.getTracks().forEach(t => rtcPc.addTrack(t, stream));

      rtcPc.oniceconnectionstatechange = () => {
        if (["failed", "disconnected", "closed"].includes(rtcPc.iceConnectionState)) {
          stopWebRTC();
          setStatus("idle", "Disconnected");
        }
      };

      const offer = await rtcPc.createOffer();
      await rtcPc.setLocalDescription(offer);

      // Wait for ICE gathering to complete (max 5 s) so TURN relay candidates are included
      await new Promise(resolve => {
        if (rtcPc.iceGatheringState === "complete") { resolve(); return; }
        const check = () => {
          if (rtcPc.iceGatheringState === "complete") {
            rtcPc.removeEventListener("icegatheringstatechange", check);
            resolve();
          }
        };
        rtcPc.addEventListener("icegatheringstatechange", check);
        setTimeout(resolve, 5000);
      });

      try {
        const res = await fetch(`/api/webrtc/offer/${lane}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sdp: rtcPc.localDescription.sdp, type: rtcPc.localDescription.type }),
        });
        if (!res.ok) throw new Error("Server rejected offer");
        const answer = await res.json();
        await rtcPc.setRemoteDescription(answer);
        active = true;
        setStatus("live", "Live (WebRTC)");
        toggleBtn.textContent = "Stop Streaming";
        toggleBtn.disabled = false;
      } catch (_) {
        setStatus("error", "WebRTC failed — check coturn setup");
        stopWebRTC();
      }
    }

    function stopWebRTC() {
      active = false;
      if (rtcPc) { rtcPc.close(); rtcPc = null; }
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      preview.srcObject = null;
      toggleBtn.textContent = "Start Streaming";
      toggleBtn.disabled = false;
      laneSelect.disabled = false;
    }

    toggleBtn.addEventListener("click", () => {
      if (active) {
        captureMode === "webrtc" ? stopWebRTC() : stopStreaming();
        setStatus("idle", "Idle");
      } else {
        captureMode === "webrtc" ? void startWebRTC() : void startStreaming();
      }
    });

    document.getElementById("logout-button").addEventListener("click", async () => {
      await fetch("/api/auth/logout", { method: "POST" });
      window.location.href = "/login";
    });

    window.addEventListener("beforeunload", () => {
      captureMode === "webrtc" ? stopWebRTC() : stopStreaming();
    });
  </script>
</body>
</html>
