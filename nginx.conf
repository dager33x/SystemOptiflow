map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# ── HTTP: ACME challenge passthrough + redirect everything else to HTTPS ───────
server {
    listen 80;
    server_name _;

    # Let's Encrypt HTTP-01 fallback (not used with DuckDNS DNS challenge, kept for safety)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
# Cert path uses --cert-name optiflow so it's domain-independent.
# Run scripts/vps_setup.sh on first deploy to obtain the real cert.
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/optiflow/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/optiflow/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    client_max_body_size 25m;

    # MJPEG streams — persistent connections, no buffering, extended timeout
    location ~ ^/api/streams/.*\.mjpeg$ {
        proxy_pass http://optiflow-app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;
        proxy_set_header X-Accel-Buffering no;
    }

    # WebSocket — upgrade headers, long-lived but not infinite
    location /ws/ {
        proxy_pass http://optiflow-app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # All other routes
    location / {
        proxy_pass http://optiflow-app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_read_timeout 30s;
    }
}
